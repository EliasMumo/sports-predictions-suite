name: end_user_app
description: Production-ready end-user experience for the Sports Predictions Suite.
publish_to: none

version: 1.0.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  firebase_messaging: ^16.0.4
  intl: ^0.20.2
  url_launcher: ^6.3.1
  predictions_shared:
    path: ../../packages/predictions_shared
  shared_resources:
    path: ../../shared
  purchases_flutter: ^9.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - ../../shared/assets/icons/
    - assets/icon/
    - assets/splash/
