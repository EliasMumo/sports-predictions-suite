name: admin_app
description: Internal admin dashboard for managing Sports Predictions data.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  cloud_functions: ^6.0.4
  firebase_messaging: ^16.0.4
  intl: ^0.20.2
  predictions_shared:
    path: ../../packages/predictions_shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/admin_icon.png"
  adaptive_icon_background: "#D32F2F"
  adaptive_icon_foreground: "assets/icon/admin_icon.png"

flutter:
  uses-material-design: true
  assets:
    - ../../shared/assets/icons/
    - assets/icon/
    - assets/splash/
